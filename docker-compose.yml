services:
    postgres:
        image: postgres:15
        container_name: booking_postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres123
            POSTGRES_DB: booking_dev
        ports:
            - '5433:5432'
        volumes:
            - booking_postgres_data:/var/lib/postgresql/data

volumes:
    booking_postgres_data:
